<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* KHUNG */
.slider {
    width: 400px;
    height: 450px;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

/* DANH SÁCH ẢNH */
.slides {
    display: flex;
    width: 500%;
    height: 100%;
    animation: slide 20s infinite;
}

.slides img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* giữ nguyên ảnh */
    background: black;
}

/* HIỆU ỨNG MƯỢT */
@keyframes slide {
    0%,20%   { transform: translateX(0); }
    25%,45%  { transform: translateX(-100%); }
    50%,70%  { transform: translateX(-200%); }
    75%,95%  { transform: translateX(-300%); }
    100%     { transform: translateX(-400%); }
}
</style>

</head>
<body>

<div class="slider">
    <div class="slides">
        <img src="images/VD1.jpg">
        <img src="images/VD2.jpg">
        <img src="images/VD3.jpg">
        <img src="images/VD4.jpg">
        <img src="images/VD5.jpg">
    </div>
</div>

</body>
</html>
