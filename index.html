<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* KHUNG */
.slider {
    width: 400px;
    height: 450px;
    overflow: hidden;
    border-radius: 12px;
    position: relative;
}

/* SLIDES */
.slides {
    display: flex;
    width: 500%;
    height: 100%;
    transition: transform 0.6s ease-in-out;
}

.slides img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
}

/* NÚT */
.btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    font-size: 18px;
}

.prev { left: 5px; }
.next { right: 5px; }

/* DOT */
.dots {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
}

.dot {
    height: 10px;
    width: 10px;
    margin: 5px;
    display: inline-block;
    background: gray;
    border-radius: 50%;
    cursor: pointer;
}

.active {
    background: white;
}
</style>

</head>
<body>

<div class="slider" id="slider">

    <div class="slides" id="slides">
        <img src="images/VD1.jpg">
        <img src="images/VD2.jpg">
        <img src="images/VD3.jpg">
        <img src="images/VD4.jpg">
        <img src="images/VD5.jpg">
    </div>

    <!-- Nút -->
    <button class="btn prev" onclick="prevSlide()">❮</button>
    <button class="btn next" onclick="nextSlide()">❯</button>

    <!-- Dots -->
    <div class="dots" id="dots"></div>

</div>

<script>
let index = 0;
const slides = document.getElementById("slides");
const total = slides.children.length;
const dotsContainer = document.getElementById("dots");

// tạo dots
for (let i = 0; i < total; i++) {
    let dot = document.createElement("span");
    dot.className = "dot";
    dot.onclick = () => goToSlide(i);
    dotsContainer.appendChild(dot);
}

function updateSlider() {
    slides.style.transform = "translateX(" + (-index * 100) + "%)";
    document.querySelectorAll(".dot").forEach((d, i) => {
        d.classList.toggle("active", i === index);
    });
}

function nextSlide() {
    index = (index + 1) % total;
    updateSlider();
}

function prevSlide() {
    index = (index - 1 + total) % total;
    updateSlider();
}

function goToSlide(i) {
    index = i;
    updateSlider();
}

// auto chạy
let auto = setInterval(nextSlide, 4000);

// dừng khi rê chuột
document.getElementById("slider").addEventListener("mouseenter", () => clearInterval(auto));
document.getElementById("slider").addEventListener("mouseleave", () => auto = setInterval(nextSlide, 4000));

// vuốt tay mobile
let startX = 0;
slider.addEventListener("touchstart", e => startX = e.touches[0].clientX);

slider.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;
    if (startX - endX > 50) nextSlide();
    if (endX - startX > 50) prevSlide();
});

// khởi tạo
updateSlider();
</script>

</body>
</html>
