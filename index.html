<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* KHUNG */
.slider {
    width: 310px;
    height: 400px;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
}

/* ẢNH */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: white;
}

/* ẢNH HIỆN */
.active {
    opacity: 1;
}

/* NÚT */
.btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 8px;
    cursor: pointer;
}

.prev { left: 5px; }
.next { right: 5px; }

/* DOT */
.dots {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
}

.dot {
    height: 10px;
    width: 10px;
    background: gray;
    margin: 4px;
    display: inline-block;
    border-radius: 50%;
    cursor: pointer;
}

.dot.active {
    background: white;
}
</style>

</head>
<body>

<div class="slider" id="slider">

    <div class="slide active"><img src="images/VD1.jpg"></div>
    <div class="slide"><img src="images/VD2.jpg"></div>
    <div class="slide"><img src="images/VD3.jpg"></div>
    <div class="slide"><img src="images/VD4.jpg"></div>
    <div class="slide"><img src="images/VD5.jpg"></div>

    <button class="btn prev" onclick="prev()">❮</button>
    <button class="btn next" onclick="next()">❯</button>

    <div class="dots" id="dots"></div>

</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");
const dotsContainer = document.getElementById("dots");

// tạo dots
slides.forEach((_, i) => {
    let dot = document.createElement("span");
    dot.className = "dot";
    dot.onclick = () => go(i);
    dotsContainer.appendChild(dot);
});

function showSlide(i) {
    slides.forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".dot").forEach(d => d.classList.remove("active"));

    slides[i].classList.add("active");
    document.querySelectorAll(".dot")[i].classList.add("active");
}

function next() {
    index = (index + 1) % slides.length;
    showSlide(index);
}

function prev() {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
}

function go(i) {
    index = i;
    showSlide(index);
}

// auto chạy CHẬM & MƯỢT
let auto = setInterval(next, 5000);

// dừng khi rê chuột
slider.onmouseenter = () => clearInterval(auto);
slider.onmouseleave = () => auto = setInterval(next, 5000);

// khởi tạo
showSlide(0);
</script>

</body>
</html>
